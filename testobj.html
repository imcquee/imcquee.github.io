<!DOCTYPE html>
<html>
<head>
<script>

var xhttp = new XMLHttpRequest();
xhttp.open("POST", "http://server.isaacmcqueen.me:9615/action", true);
xhttp.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
xhttp.onreadystatechange = function() {
  if (this.readyState == 4 && this.status == 200) {
    var val = JSON.parse(this.responseText);
    for(i=0;i<val.drivers.length;i++){
      console.log(val.drivers[i].name);
      console.log(val.drivers[i].points);
    }
    document.getElementById("d1").innerHTML = val.drivers[0].name;
    document.getElementById("d1name").innerHTML = val.drivers[0].name; 
    document.getElementById("dAdd").value = val.drivers[0].points;
  }
};
var obj = "action=driverPoints"
xhttp.withCredentials = true;
xhttp.send(obj);
</script>
</head>
<body>
  <form action="http://server.isaacmcqueen.me:9615" method="post">
    <input type="hidden" name="accT" value="updatePoints">
    <label for="username" id="d1">Driver1 Name</label> 
    <input type="hidden" id="d1name" name="d1name" value="">
		<input type="number" id="dAdd" name="d1points" value="">
    <button type="submit" >Update Points</button>  
  </form>
</body>
</html>
