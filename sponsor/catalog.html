<!DOCTYPE html>
<html style="overflow-x:hidden" id="mainCatalogHtml">
  <head>
    <!-- <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"> -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="catalog.js"></script>
    <script src="app.js"></script>
  </head>
  <body onload="makeCatalog()">
    <div id="mainCatalog" style="height:100%;width:100%;margin-left:2vh;margin-right:2vh;margin-bottom:2vh">
      <button type="button" class="btn btn-info" style="height:10%;width:5%;position:fixed;bottom:2%;right:2%;z-index:4" onclick="openAdd()">
        <i class="fa fa-plus-circle" aria-hidden="true" style="font-size:7vh"></i>
      </button>
    </div>
    <div id="itemOverlay" class="itemOverlay" style="z-index:6">
      <div id="overlayContent" class="overlayContent">
        <button type="button" class="close overlayCloseBtn" onclick="closeItemOverlay()">&times;</button>
        <div id="itemContent">
        </div>
        <div class="prodDescription">
        </div>
        <div id="prodDes">
        </div>
        <div class="prodReview">
        </div>
        <div id="prodRev">
        </div>
      </div>
    </div>
    <div id="addOverlay" class="itemOverlay" style="z-index:6">
      <div id="addContent" style="background-color: #fff;border: 1px solid #000;text-align:center;height: 30%;width: 94%;margin: auto;position: fixed;top: 0;right: 0;bottom: 2vh;left: 0;">
        <button type="button" class="close overlayCloseBtn" onclick="closeAddOverlay()">&times;</button>
        <div class="prodDescription" style="width: 92%">
          <h3 style="float:left">Input the ePID of the Product you Wish to Add to the Catalog</h3>
        </div>
        <input id="itemToAdd" number="text" class="inputAdd"></input>
        <button type="button" class="btn btn-primary add-btn" onclick="addToCatalog()"><h4>Add to Catalog</h4></button>
      </div>
    </div>
  </body>
</html>
